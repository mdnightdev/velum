name: Stress Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  k6-stress-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install

    - name: Run server in background
      run: npm run dev &
      env:
        NODE_ENV: development
        MIDNIGHT_PASSWORD: testpassword

    - name: Wait for server to be ready
      run: sleep 10

    - name: Setup k6
      uses: grafana/setup-k6-action@v1

    - name: Run k6 load test
      run: k6 run stress-tests/load_test.ts
